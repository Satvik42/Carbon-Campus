# =========================================================================
# GitHub Actions - Carbon Compass CI/CD Pipeline
# =========================================================================
# Triggers on push events to the main branch.
# Audits, tests, and compiles the project, then deploys to Google Cloud Run.
# =========================================================================

name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: "your-gcp-project-id" # REPLACE or configure in GitHub Secrets as GCP_PROJECT_ID
  SERVICE_NAME: "carbon-compass"
  REGION: "us-central1"
  AR_REPO: "carbon-compass-repo"

jobs:
  # -------------------------------------------------------------------------
  # 🧪 Job 1: Audit, Lint, Test and Build Check
  # -------------------------------------------------------------------------
  audit-and-test:
    name: Audit & Test Codebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run Eslint Audit
        run: npm run lint

      - name: Run Vitest Unit Tests
        run: npm run test

      - name: Validate Production Compilation
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
          # Dummy key to bypass build-time environment checks
          GEMINI_API_KEY: "dummy-key-value-during-compilation"

  # -------------------------------------------------------------------------
  # 🚀 Job 2: Build Image and Deploy to GCP
  # -------------------------------------------------------------------------
  build-and-deploy:
    name: Build & Deploy to Cloud Run
    needs: audit-and-test
    runs-on: ubuntu-latest
    
    # Required permissions for Workload Identity Federation
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # 🔐 Auth Option A (Recommended): Workload Identity Federation
      # ---------------------------------------------------------------------
      # Uncomment and configure these variables in your GitHub Secrets:
      # - name: Authenticate to Google Cloud
      #   uses: google-github-actions/auth@v2
      #   with:
      #     workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      #     service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      
      # ---------------------------------------------------------------------
      # 🔐 Auth Option B (Fallback): Service Account Key JSON
      # ---------------------------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker Credential Helper
        run: |
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Docker Container
        run: |
          IMAGE_URL="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $IMAGE_URL .
          docker push $IMAGE_URL
          echo "IMAGE_URL=$IMAGE_URL" >> $GITHUB_ENV

      - name: Deploy Container to Google Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE_URL }}
          # Expose Secret Manager secret 'GEMINI_API_KEY' to runtime env
          secrets: |
            GEMINI_API_KEY=GEMINI_API_KEY:latest
          flags: |
            --allow-unauthenticated
            --platform=managed
